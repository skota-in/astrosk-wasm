name: Release to npm

on:
  release:
    types: [published]
  # Manual trigger: useful when you want to retry publish without
  # deleting/recreating the GitHub release. Provide the version
  # explicitly; it must match package.json.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0). Must match package.json.'
        required: true
        type: string

permissions:
  contents: read

# GitHub is migrating its JavaScript actions runtime from Node.js 20 to
# Node.js 24 (default switch on 2026-06-02). Opt in early so the
# v4 / v14 action tags we use keep running cleanly.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    outputs:
      version: ${{ steps.version.outputs.version }}
      tarball: ${{ steps.pack.outputs.tarball }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine target version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            RAW="${{ github.event.release.tag_name }}"
          else
            RAW="${{ inputs.version }}"
          fi
          VERSION="${RAW#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Target version: $VERSION"

      - name: Verify version matches package.json
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TARGET="${{ steps.version.outputs.version }}"
          echo "package.json: $PKG_VERSION"
          echo "target:       $TARGET"
          if [ "$TARGET" != "$PKG_VERSION" ]; then
            echo "::error::Version ($TARGET) does not match package.json ($PKG_VERSION). Bump package.json before releasing."
            exit 1
          fi

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
          actions-cache-folder: emsdk-cache

      - name: Verify emcc
        run: emcc -v

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (WASM + TypeScript)
        run: pnpm build

      - name: Test against swetest reference values
        run: pnpm test

      - name: Pack tarball
        id: pack
        run: |
          npm pack --json > pack.json
          TARBALL=$(node -p "require('./pack.json')[0].filename")
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          echo "Packed: $TARBALL"
          ls -lh "$TARBALL"

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: npm-tarball
          path: ${{ steps.pack.outputs.tarball }}
          retention-days: 30
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      id-token: write   # required for npm provenance

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download tarball
        uses: actions/download-artifact@v4
        with:
          name: npm-tarball

      - name: Verify tarball is present
        run: |
          TARBALL="${{ needs.build.outputs.tarball }}"
          if [ ! -f "$TARBALL" ]; then
            echo "::error::Expected tarball '$TARBALL' not found after download."
            ls -la
            exit 1
          fi
          echo "Will publish: $TARBALL"

      # Sigstore's rekor.sigstore.dev transparency log is occasionally
      # unreachable mid-publish (TLOG_CREATE_ENTRY_ERROR). Retry up to
      # 3 times before failing; subsequent attempts hit a fresh
      # endpoint and almost always succeed.
      - name: Publish to npm with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          TARBALL: ${{ needs.build.outputs.tarball }}
        run: |
          set -e
          for attempt in 1 2 3; do
            echo "::group::npm publish attempt $attempt"
            if npm publish "$TARBALL" --provenance --access public; then
              echo "::endgroup::"
              echo "Published on attempt $attempt"
              exit 0
            fi
            STATUS=$?
            echo "::endgroup::"
            echo "::warning::Publish attempt $attempt failed (exit $STATUS). Retrying in 30s..."
            sleep 30
          done
          echo "::error::npm publish failed after 3 attempts."
          exit 1
